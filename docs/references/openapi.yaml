  # =============================================================================
  # ASSETS API
  # =============================================================================

  /api/assets/hash/{hash}:
    head:
      tags: [Assets]
      summary: Check if asset exists by hash
      operationId: head_asset_by_hash
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
          example: blake3:abc123def456
      responses:
        '200':
          description: Asset exists
        '404':
          description: Asset not found

  /api/assets:
    get:
      tags: [Assets]
      summary: List assets
      operationId: list_assets_route
      parameters:
        - name: include_tags
          in: query
          schema:
            type: string
          description: Comma-separated tags to include
        - name: exclude_tags
          in: query
          schema:
            type: string
        - name: name_contains
          in: query
          schema:
            type: string
        - name: metadata_filter
          in: query
          schema:
            type: string
          description: JSON object for metadata filtering
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, created_at, updated_at, size, last_access_time]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Asset list
    post:
      tags: [Assets]
      summary: Upload new asset
      operationId: upload_asset
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                tags:
                  type: array
                  items:
                    type: string
                name:
                  type: string
                user_metadata:
                  type: string
                hash:
                  type: string
      responses:
        '200':
          description: Asset uploaded

  /api/assets/{id}:
    get:
      tags: [Assets]
      summary: Get asset details
      operationId: get_asset_route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          format: uuid
      responses:
        '200':
          description: Asset details
    put:
      tags: [Assets]
      summary: Update asset metadata
      operationId: update_asset_route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                user_metadata:
                  type: object
      responses:
        '200':
          description: Asset updated
    delete:
      tags: [Assets]
      summary: Delete asset reference
      operationId: delete_asset_route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: delete_content
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        '200':
          description: Asset deleted

  /api/assets/{id}/content:
    get:
      tags: [Assets]
      summary: Download asset content
      operationId: download_asset_content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: disposition
          in: query
          schema:
            type: string
            enum: [inline, attachment]
            default: attachment
      responses:
        '200':
          description: Asset content binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/assets/from-hash:
    post:
      tags: [Assets]
      summary: Create asset reference from existing hash
      operationId: create_asset_from_hash
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [hash]
              properties:
                hash:
                  type: string
                name:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                user_metadata:
                  type: object
      responses:
        '200':
          description: Asset created

  /api/tags:
    get:
      tags: [Assets]
      summary: List all tags
      operationId: get_tags
      parameters:
        - name: prefix
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
        - name: order
          in: query
          schema:
            type: string
            enum: [count_desc, name_asc]
        - name: include_zero
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Tag list

  /api/assets/{id}/tags:
    post:
