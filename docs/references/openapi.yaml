# =============================================================================
# COMPONENTS
# =============================================================================

components:
  schemas:
    PromptRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: object
          description: Workflow node graph keyed by node_id
          additionalProperties:
            type: object
            required: [class_type, inputs]
            properties:
              class_type:
                type: string
                description: Node class name (e.g. KSampler, LoadImage)
              inputs:
                type: object
                description: Node input key-value pairs
                additionalProperties: true
              _meta:
                type: object
                description: Node metadata (title, tags, etc.)
                additionalProperties: true
        prompt_id:
          type: string
          description: Custom prompt UUID (auto-generated if not provided)
        number:
          type: number
          description: Queue position (float for precise ordering)
        front:
          type: boolean
          description: Execute at front of queue if true
          default: false
        extra_data:
          type: object
          description: 'Extra data (e.g. {client_id: string} for WebSocket events)'
        partial_execution_targets:
          type: array
          items:
            type: string
          description: Subset of node IDs to execute
        node_errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: object

    QueueStatus:
      type: object
      properties:
        queue_running:
          type: array
          items:
            type: array
            items:
              type: string
        queue_pending:
          type: array
          items:
            type: array
            items:
              type: string

    QueueModifyRequest:
      type: object
      properties:
        clear:
          type: boolean
          description: Clear all queue items
        delete:
          type: array
          items:
            type: string
          description: Delete specific prompt_ids

    FreeMemoryRequest:
      type: object
      properties:
        unload_models:
          type: boolean
          description: Unload all models from VRAM
          default: true
        free_memory:
          type: boolean
          description: Free system RAM
          default: true

    Job:
      type: object
      properties:
        id:
          type: string
        prompt_id:
          type: string
        workflow_id:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, failed]
        created_at:
          type: number
        started_at:
          type: number
        finished_at:
          type: number
        execution_duration:
          type: number
        error:
          type: string
          nullable: true
        outputs:
          type: object

    JobList:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        total:
          type: integer
