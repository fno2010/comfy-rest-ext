openapi: 3.0.3
info:
  title: ComfyUI REST API
  description: |
    ComfyUI and ComfyUI Manager REST API specification.

    **Framework**: aiohttp
    **Base URL**: http://{host}:{port} (default http://127.0.0.1:8188)

    ## Authentication
    ComfyUI has no built-in authentication. Deploy behind a reverse proxy (nginx, Caddy, etc.)
    to add authentication layer.

    ## Path Prefixes
    - `/api/*` — Core ComfyUI API (most routes also available without `/api` prefix)
    - `/internal/*` — Internal API (for ComfyUI frontend only)
    - `/v2/manager/*` — ComfyUI Manager core functionality
    - `/v2/customnode/*` — Custom node management
    - `/v2/snapshot/*` — Snapshot management
    - `/v2/comfyui_manager/*` — ComfyUI version management

    ## WebSocket
    Connect to `ws://{host}:{port}/ws` for real-time events (execution progress, status updates).
    Include `client_id` in your prompt's `extra_data` to receive targeted events.
  version: 1.0.0
  contact:
    name: ComfyUI

servers:
  - url: http://127.0.0.1:8188
    description: ComfyUI default server

tags:
  - name: Execution
    description: Prompt execution and queue management
  - name: Jobs
    description: Job tracking
  - name: History
    description: Execution history
  - name: Models
    description: Model listing and management
  - name: Images
    description: Image upload, view, and metadata
  - name: Nodes
    description: Node class information
  - name: System
    description: System stats and features
  - name: Internal
    description: Internal API (frontend use)
  - name: Users
    description: User management
  - name: Settings
    description: Application settings
  - name: Workflows
    description: Workflow templates and subgraphs
  - name: Assets
    description: Asset management API
  - name: Manager
    description: ComfyUI Manager core operations
  - name: Manager.Node
    description: Custom node management
  - name: Manager.Snapshot
    description: Snapshot management
  - name: Manager.Share
    description: Third-party sharing services
  - name: Manager.Model
    description: Model installation via Manager

paths:
  # =============================================================================
  # EXECUTION
  # =============================================================================

  /prompt:
    get:
      tags: [Execution]
      summary: Get queue information
      description: Returns current running and pending queues with prompt IDs.
      operationId: get_prompt
      responses:
        '200':
          description: Queue information
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue_running:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
                    example: [["prompt-uuid", "node-id"]]
                  queue_pending:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
    post:
      tags: [Execution]
      summary: Submit workflow for execution
      description: |
        Submit a workflow (prompt) to the execution queue.

        The prompt is a JSON object representing a directed graph of nodes.
        Each node has a `class_type` (node class name) and `inputs` (key-value pairs).

        Input values can be:
        - Primitives: `string`, `number`, `boolean`
        - Links: `["other_node_id", output_index]` — reference another node's output
        - Lists: `[val1, val2, ...]`

        Use WebSocket at `/ws` with `client_id` in `extra_data` to receive real-time updates.
      operationId: post_prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptRequest'
            example:
              prompt:
                "1":
                  class_type: KSampler
                  inputs:
                    model: ["2", 0]
                    seed: 1234567890
                    steps: 20
                    cfg: 8.0
                    sampler_name: euler
                    scheduler: normal
                    positive: ["3", 0]
                    negative: ["4", 0]
                    denoise: 1.0
                  _meta:
                    title: KSampler
                "2":
                  class_type: CheckpointLoaderSimple
                  inputs:
                    ckpt_name: model.safetensors
                "3":
                  class_type: CLIPTextEncode
                  inputs:
                    text: "high quality, detailed"
                    clip: ["2", 1]
                "4":
                  class_type: CLIPTextEncode
                  inputs:
                    text: "blurry, low quality"
                    clip: ["2", 1]
              prompt_id: "optional-custom-uuid"
              front: false
              extra_data:
                client_id: "websocket-client-id"
      responses:
        '200':
          description: Prompt queued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt_id:
                    type: string
                    example: "prompt-uuid-string"
                  number:
                    type: number
                    example: 1.0
                  node_errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
              example:
                prompt_id: "abc123"
                number: 1.0
                node_errors: {}

  /queue:
    get:
      tags: [Execution]
      summary: Get queue status
      operationId: get_queue
      responses:
        '200':
          description: Current queue status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueStatus'
    post:
      tags: [Execution]
      summary: Modify queue
      description: Clear all queue items or delete specific items.
      operationId: post_queue
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueueModifyRequest'
            example:
              clear: true
              delete: ["prompt-id-1", "prompt-id-2"]
      responses:
        '200':
          description: Queue modified
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /interrupt:
    post:
      tags: [Execution]
      summary: Interrupt execution
      description: Interrupt current execution. Without prompt_id interrupts all; with prompt_id interrupts only that specific execution.
      operationId: post_interrupt
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt_id:
                  type: string
                  description: Optional specific prompt ID to interrupt
            example:
              prompt_id: "specific-prompt-uuid"
      responses:
        '200':
          description: Interrupt triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /free:
    post:
      tags: [Execution]
      summary: Free memory and unload models
      operationId: post_free
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeMemoryRequest'
            example:
              unload_models: true
              free_memory: true
      responses:
        '200':
          description: Memory freed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  vram_free:
                    type: string
                    example: "2.00 GiB"
                  ram_free:
                    type: string
                    example: "12.34 GiB"

  # =============================================================================
  # JOBS
  # =============================================================================

  /api/jobs:
    get:
      tags: [Jobs]
      summary: List all jobs
      description: List jobs with optional filtering, sorting, and pagination.
      operationId: get_jobs
      parameters:
        - name: status
          in: query
          description: Filter by status (comma-separated)
          schema:
            type: string
            enum: [pending, in_progress, completed, failed]
          example: "completed,failed"
        - name: workflow_id
          in: query
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, execution_duration]
            default: created_at
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'

  /api/jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: Get specific job
      operationId: get_job_by_id
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'

  # =============================================================================
  # HISTORY
  # =============================================================================

  /history:
    get:
      tags: [History]
      summary: Get execution history
      operationId: get_history
      parameters:
        - name: max_entries
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: History entries keyed by prompt_id
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    status:
                      type: object
                      properties:
                        exec_rt:
                          type: number
                        ids:
                          type: array
                          items:
                            type: string
                    outputs:
                      type: object
                      additionalProperties:
                        type: object
    post:
      tags: [History]
      summary: Clear or delete history
      operationId: post_history
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                clear:
                  type: boolean
                delete:
                  type: array
                  items:
                    type: string
            example:
              clear: true

  /history/{prompt_id}:
    get:
      tags: [History]
      summary: Get history for specific prompt
      operationId: get_history_prompt_id
      parameters:
        - name: prompt_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: History entry for the prompt
          content:
            application/json:
              schema:
                type: object

  # =============================================================================
  # MODELS
  # =============================================================================

  /models:
    get:
      tags: [Models]
      summary: List model type folders
      operationId: list_model_types
      responses:
        '200':
          description: List of model folder names
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items:
                      type: string
                    example: ["checkpoints", "loras", "embeddings", "upscale_models"]

  /models/{folder}:
    get:
      tags: [Models]
      summary: List models in a folder
      operationId: get_models
      parameters:
        - name: folder
          in: path
          required: true
          schema:
            type: string
          example: checkpoints
      responses:
        '200':
          description: List of model filenames
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_names:
                    type: array
                    items:
                      type: string
                    example: ["model_a.safetensors", "model_b.ckpt"]

  /experiment/models:
    get:
      tags: [Models]
      summary: List model folders with full paths (experimental)
      operationId: get_model_folders_exp
      responses:
        '200':
          description: Model folders with paths

  /experiment/models/{folder}:
    get:
      tags: [Models]
      summary: List all models in folder with metadata (experimental)
      operationId: get_all_models_exp
      parameters:
        - name: folder
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Models with metadata

  /experiment/models/preview/{folder}/{path_index}/{filename}:
    get:
      tags: [Models]
      summary: Get model preview image (experimental)
      operationId: get_model_preview
      parameters:
        - name: folder
          in: path
          required: true
          schema:
            type: string
        - name: path_index
          in: path
          required: true
          schema:
            type: string
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview image in WEBP format
          content:
            image/webp: {}

  # =============================================================================
  # IMAGES
  # =============================================================================

  /upload/image:
    post:
      tags: [Images]
      summary: Upload image
      operationId: upload_image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Image file
                overwrite:
                  type: string
                  enum: ["true", "false"]
                  default: "false"
                type:
                  type: string
                  default: input
      responses:
        '200':
          description: Image uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    example: uploaded_image.png
                  path:
                    type: string
                    example: path/to/uploaded_image.png

  /upload/mask:
    post:
      tags: [Images]
      summary: Upload mask image
      description: Upload a mask for compositing with original_ref image.
      operationId: upload_mask
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image, original_ref]
              properties:
                image:
                  type: string
                  format: binary
                original_ref:
                  type: string
                  description: Reference image path for compositing
                overwrite:
                  type: string
                  enum: ["true", "false"]
      responses:
        '200':
          description: Mask uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  path:
                    type: string

  /view:
    get:
      tags: [Images]
      summary: View or download image
      operationId: view_image
      parameters:
        - name: filename
          in: query
          required: true
          schema:
            type: string
          example: image.png
        - name: type
          in: query
          schema:
            type: string
            enum: [input, output, temp]
            default: output
        - name: subfolder
          in: query
          schema:
            type: string
        - name: preview
          in: query
          schema:
            type: string
          description: Preview format e.g. "webp;90" for 90% quality
          example: "webp;90"
        - name: channel
          in: query
          schema:
            type: string
            enum: [rgba, rgb, a]
      responses:
        '200':
          description: Image binary data
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary

  /view_metadata/{folder_name}:
    get:
      tags: [Images]
      summary: Get safetensors metadata
      operationId: view_metadata
      parameters:
        - name: folder_name
          in: path
          required: true
          schema:
            type: string
        - name: filename
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            default: output
      responses:
        '200':
          description: Safetensors metadata
          content:
            application/json:
              schema:
                type: object

  # =============================================================================
  # NODES
  # =============================================================================

  /object_info:
    get:
      tags: [Nodes]
      summary: Get info for all node classes
      description: Returns complete definitions for all registered node classes including inputs, outputs, and metadata.
      operationId: get_object_info
      responses:
        '200':
          description: Node class definitions keyed by class name
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object

  /object_info/{node_class}:
    get:
      tags: [Nodes]
      summary: Get info for specific node class
      operationId: get_object_info_node
      parameters:
        - name: node_class
          in: path
          required: true
          schema:
            type: string
          example: KSampler
      responses:
        '200':
          description: Node class definition
          content:
            application/json:
              schema:
                type: object

  # =============================================================================
  # SYSTEM
  # =============================================================================

  /system_stats:
    get:
      tags: [System]
      summary: Get system statistics
      operationId: system_stats
      responses:
        '200':
          description: System stats including RAM, VRAM, and version info
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        type:
                          type: string
                        index:
                          type: integer
                        vram_total:
                          type: number
                        vram_free:
                          type: number
                        torch_vram_total:
                          type: number
                        torch_vram_free:
                          type: number
                  ram_total:
                    type: number
                  ram_free:
                    type: number
                  version:
                    type: string

  /features:
    get:
      tags: [System]
      summary: Get server feature flags
      operationId: get_features
      responses:
        '200':
          description: Feature flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  disableicanhaz:
                    type: boolean
                  disable_list:
                    type: boolean
                  feature_config:
                    type: object

  /embeddings:
    get:
      tags: [System]
      summary: List available text embeddings
      operationId: get_embeddings
      responses:
        '200':
          description: List of embedding filenames
          content:
            application/json:
              schema:
                type: object
                properties:
                  embeddings:
                    type: array
                    items:
                      type: string

  /extensions:
    get:
      tags: [System]
      summary: List JavaScript extensions
      operationId: get_extensions
      responses:
        '200':
          description: List of extension paths
          content:
            application/json:
              schema:
                type: object
                properties:
                  extensions:
                    type: array
                    items:
                      type: string

  # =============================================================================
  # INTERNAL
  # =============================================================================

  /internal/logs:
    get:
      tags: [Internal]
      summary: Get formatted server logs
      operationId: get_logs
      responses:
        '200':
          description: Formatted logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string

  /internal/logs/raw:
    get:
      tags: [Internal]
      summary: Get raw logs with terminal size info
      operationId: get_raw_logs
      responses:
        '200':
          description: Raw logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                  width:
                    type: integer
                  height:
                    type: integer

  /internal/logs/subscribe:
    patch:
      tags: [Internal]
      summary: Subscribe to log updates
      operationId: subscribe_logs
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [clientId, enabled]
              properties:
                clientId:
                  type: string
                enabled:
                  type: boolean
      responses:
        '200':
          description: Subscription updated

  /internal/folder_paths:
    get:
      tags: [Internal]
      summary: Get configured folder paths
      operationId: get_folder_paths
      responses:
        '200':
          description: Folder paths mapping
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

  /internal/files/{directory_type}:
    get:
      tags: [Internal]
      summary: List files in a directory
      operationId: get_internal_files
      parameters:
        - name: directory_type
          in: path
          required: true
          schema:
            type: string
            enum: [output, input, temp]
        - name: recursive
          in: query
          schema:
            type: boolean
        - name: name
          in: query
          schema:
            type: string
      responses:
        '200':
          description: File listing

  # =============================================================================
  # USERS
  # =============================================================================

  /users:
    get:
      tags: [Users]
      summary: List users (multi-user mode)
      operationId: get_users
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  storage:
                    type: string
                  users:
                    type: object
                    additionalProperties:
                      type: string
    post:
      tags: [Users]
      summary: Create a new user
      operationId: post_users
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
      responses:
        '200':
          description: User created

  # =============================================================================
  # USERDATA
  # =============================================================================

  /userdata:
    get:
      tags: [Users]
      summary: List user data files
      operationId: list_userdata
      parameters:
        - name: dir
          in: query
          required: true
          schema:
            type: string
        - name: recurse
          in: query
          schema:
            type: string
            enum: ["true"]
        - name: full_info
          in: query
          schema:
            type: string
            enum: ["true"]
        - name: split
          in: query
          schema:
            type: string
            enum: ["true"]
      responses:
        '200':
          description: User data file listing

  /v2/userdata:
    get:
      tags: [Users]
      summary: List user data files (v2)
      operationId: list_userdata_v2
      parameters:
        - name: path
          in: query
          schema:
            type: string
      responses:
        '200':
          description: User data file listing

  /userdata/{file}:
    get:
      tags: [Users]
      summary: Download user data file
      operationId: get_userdata
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
    post:
      tags: [Users]
      summary: Upload/create user data file
      operationId: post_userdata
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
        - name: overwrite
          in: query
          schema:
            type: string
            enum: ["true", "false"]
            default: "true"
        - name: full_info
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: File uploaded
    delete:
      tags: [Users]
      summary: Delete user data file
      operationId: delete_userdata
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File deleted

  /userdata/{file}/move/{dest}:
    post:
      tags: [Users]
      summary: Move/rename user data file
      operationId: move_userdata
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
        - name: dest
          in: path
          required: true
          schema:
            type: string
        - name: overwrite
          in: query
          schema:
            type: string
            enum: ["true", "false"]
            default: "true"
        - name: full_info
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        '200':
          description: File moved

  # =============================================================================
  # SETTINGS
  # =============================================================================

  /settings:
    get:
      tags: [Settings]
      summary: Get all settings
      operationId: get_settings
      responses:
        '200':
          description: All settings
          content:
            application/json:
              schema:
                type: object
    post:
      tags: [Settings]
      summary: Update multiple settings
      operationId: post_settings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Settings updated

  /settings/{id}:
    get:
      tags: [Settings]
      summary: Get specific setting
      operationId: get_setting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Setting value
    post:
      tags: [Settings]
      summary: Update specific setting
      operationId: post_setting
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema: {}
      responses:
        '200':
          description: Setting updated

  # =============================================================================
  # WORKFLOWS & SUBGRAPHS
  # =============================================================================

  /workflow_templates:
    get:
      tags: [Workflows]
      summary: Get workflow templates from custom nodes
      operationId: get_workflow_templates
      responses:
        '200':
          description: Workflow template list

  /i18n:
    get:
      tags: [Workflows]
      summary: Get internationalization translations
      operationId: get_i18n
      responses:
        '200':
          description: Translation data

  /node_replacements:
    get:
